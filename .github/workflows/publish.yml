name: publish
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (example: v0.3.0)"
        required: true
        type: string
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Download release prebuild assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p packages/webtransport/prebuilds
          gh release download "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "webtransport-native.*.node" \
            --pattern "SHA256SUMS" \
            --dir packages/webtransport/prebuilds
      - name: Verify prebuild checksums
        run: |
          cd packages/webtransport/prebuilds
          shasum -a 256 -c SHA256SUMS
      - name: Verify release tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./packages/webtransport/package.json').version")"
          EXPECTED_TAG="v${PKG_VERSION}"
          if [ "${{ inputs.tag }}" != "${EXPECTED_TAG}" ]; then
            echo "::error::Input tag (${{ inputs.tag }}) does not match package version tag (${EXPECTED_TAG})."
            exit 1
          fi
      - name: Build package dist
        run: |
          cd packages/webtransport
          npm run clean
          npm run build
          test -f dist/index.js
          test -f dist/index.d.ts
      - name: Verify package tarball (no scripts)
        run: |
          cd packages/webtransport
          npm pack --dry-run --ignore-scripts
      - name: Preflight npm auth, ownership, and version availability
        run: |
          set -euo pipefail
          REG="https://registry.npmjs.org"
          PKG="@webtransport-bun/webtransport"
          PKG_VERSION="$(node -p "require('./packages/webtransport/package.json').version")"

          WHOAMI="$(npm whoami --registry="$REG")"
          echo "Authenticated to npm as: $WHOAMI"

          npm owner ls "$PKG" --registry="$REG" > /tmp/npm_owners.txt
          if ! grep -Eq "^${WHOAMI}( |$)" /tmp/npm_owners.txt; then
            echo "::error::npm user '$WHOAMI' is not listed as an owner of $PKG"
            cat /tmp/npm_owners.txt
            exit 1
          fi

          if npm view "${PKG}@${PKG_VERSION}" version --registry="$REG" >/dev/null 2>&1; then
            echo "::error::Version ${PKG_VERSION} is already published for ${PKG}"
            exit 1
          fi
      - name: Publish to npm
        run: |
          cd packages/webtransport
          npm publish --ignore-scripts --access public --registry=https://registry.npmjs.org/
