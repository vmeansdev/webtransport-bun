# CI: build, test, interop (Chromium). P0-G.
name: test
on: [push, pull_request]
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --workspace -- -W clippy::all
      - name: cargo test
        run: cargo test --workspace
      - name: Build native addon
        run: bun run build:native
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Unit tests
        run: bun test packages/
      - name: Build reference + load-client
        run: cargo build -p reference --bins
      - name: Load-addon test
        run: bun run test:load-addon
        timeout-minutes: 5
      - name: Overload-addon test
        run: bun run test:overload-addon
        timeout-minutes: 2
      - name: Interop (Chromium)
        run: cd tools/interop && bun install && bun run install:browsers && bun run playwright test
        timeout-minutes: 5
