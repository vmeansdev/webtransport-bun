# CI: build, test, interop (Chromium). P0-G.
name: test
on: [push, pull_request]
jobs:
  soak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - run: bun run build:native
      - run: bun install --frozen-lockfile
      - name: Soak (2 min)
        run: SOAK_DURATION=120 bun tools/load/soak-addon.ts
        timeout-minutes: 5
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --workspace -- -W clippy::all
      - name: cargo test
        run: cargo test --workspace
      - name: Build native addon
        run: bun run build:native
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Unit tests
        run: bun test packages/
      - name: Build reference + load-client
        run: cargo build -p reference --bins
      - name: Load-addon test
        run: bun run test:load-addon
        timeout-minutes: 5
      - name: Overload-addon test
        run: bun run test:overload-addon
        timeout-minutes: 2
      - name: Interop (Chromium)
        run: cd tools/interop && bun install && bun run install:browsers && bun run playwright test
        timeout-minutes: 5
      - name: Smoke test (bun add from package)
        run: |
          bun run --cwd packages/webtransport prebuild
          mkdir -p /tmp/wt-smoke && cd /tmp/wt-smoke
          bun init -y
          bun add file:$GITHUB_WORKSPACE/packages/webtransport
          echo 'import { createServer } from "@webtransport-bun/webtransport"; const s = createServer({ port: 19999, tls: { certPem: "", keyPem: "" }, onSession: () => {} }); console.log("ok"); s.close().then(() => process.exit(0));' > smoke.ts
          timeout 10 bun run smoke.ts
