# CI: build, test, parity, interop (Chromium). P0-G.
name: test
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  parity:
    name: Parity (W3C facade)
    runs-on: ubuntu-latest
    env:
      WEBTRANSPORT_SUPPRESS_INSECURE_SKIP_VERIFY_WARN: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - name: Build native addon
        run: bun run build:native
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Parity tests
        run: bun run test:parity
  soak:
    runs-on: ubuntu-latest
    env:
      WEBTRANSPORT_SUPPRESS_INSECURE_SKIP_VERIFY_WARN: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - run: bun run build:native
      - run: bun install --frozen-lockfile
      - name: Soak (2 min)
        run: SOAK_DURATION=120 bun tools/load/soak-addon.ts
        timeout-minutes: 5
  test:
    runs-on: ${{ matrix.os }}
    env:
      WEBTRANSPORT_SUPPRESS_INSECURE_SKIP_VERIFY_WARN: "1"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        bun-version: ["1.3.9", "latest"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo audit
        run: cargo install cargo-audit --locked && cargo audit --ignore RUSTSEC-2026-0009
      - name: cargo clippy
        run: cargo clippy --workspace -- -D clippy::all
      - name: cargo test
        run: cargo test --workspace
      - name: Build native addon
        run: bun run build:native
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Unit tests
        run: bun test packages/
      - name: Flake guard (critical suites x3)
        run: |
          for i in 1 2 3; do
            echo "RUN:$i acceptance P3-10"
            bun test packages/webtransport/test/acceptance.test.ts -t "P3-10: moderate load completes without panic"
            echo "RUN:$i backpressure P1.2"
            bun test packages/webtransport/test/backpressure.test.ts -t "backpressure counters exist and have correct shape"
          done
        timeout-minutes: 4
      - name: Build reference + load-client
        run: cargo build -p reference --bins
      - name: Load-addon test
        run: bun run test:load-addon
        timeout-minutes: 5
      - name: Load-scale-addon (200 sessions, 30s)
        run: LOAD_SCALE_SESSIONS=200 LOAD_SCALE_DURATION=30 bun run test:load-scale-addon
        timeout-minutes: 3
      - name: Benchmark (handshake)
        run: bun run bench:handshake
        timeout-minutes: 2
      - name: Overload-addon test
        run: bun run test:overload-addon
        timeout-minutes: 2
      - name: Load profiles (P2.1)
        run: bun run test:load-profiles-addon
        timeout-minutes: 5
      - name: Interop (Chromium)
        run: cd tools/interop && bun install && bun run install:browsers && bun run prepare:interop && bun run playwright test
        timeout-minutes: 5
      - name: Smoke test (bun add from package)
        run: |
          bun run --cwd packages/webtransport build
          bun run --cwd packages/webtransport prebuild:native
          mkdir -p /tmp/wt-smoke && cd /tmp/wt-smoke
          bun init -y
          bun add file:$GITHUB_WORKSPACE/packages/webtransport
          echo 'import { createServer } from "@webtransport-bun/webtransport"; const s = createServer({ port: 19999, tls: { certPem: "", keyPem: "" }, onSession: () => {} }); console.log("ok"); s.close().then(() => process.exit(0));' > smoke.ts
          python3 -c "import subprocess; subprocess.run(['bun','run','smoke.ts'], timeout=10, check=True)"
