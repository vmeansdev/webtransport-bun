# Release: build prebuilds for all targets, generate checksums, create GitHub release, publish to npm.
name: release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_to_npm:
        description: "Publish to npm (requires npm trusted publisher configured)"
        required: false
        type: boolean
        default: false
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            rust_target: ""
          - os: macos-latest
            target: darwin-arm64
            rust_target: ""
          - os: macos-latest
            target: darwin-x64
            rust_target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - name: Build native addon (${{ matrix.target }})
        run: |
          if [ -n "${{ matrix.rust_target }}" ]; then
            rustup target add ${{ matrix.rust_target }}
            bunx @napi-rs/cli build --cwd crates/native --platform --release --target ${{ matrix.rust_target }}
          else
            bun run build:native
          fi
      - name: Prebuild + checksums
        run: |
          cd packages/webtransport && bun run prebuild:native
          cd prebuilds
          shasum -a 256 *.node > SHA256SUMS 2>/dev/null || true
      - name: Upload prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.target }}
          path: packages/webtransport/prebuilds/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: prebuilds
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: prebuilds/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish_to_npm) || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.NPM_TRUSTED_PUBLISHING == 'true') }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - uses: actions/download-artifact@v4
        with:
          path: packages/webtransport/prebuilds
          merge-multiple: true
      - name: Publish to npm
        run: |
          cd packages/webtransport
          npm publish --access public --provenance
