# Release: build prebuilds, generate checksums, create GitHub release.
name: release
on:
  push:
    tags:
      - "v*"
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - name: Build native addon (Linux x64)
        run: bun run build:native
      - name: Prebuild + checksums
        run: |
          cd packages/webtransport && bun run prebuild
          cd prebuilds
          shasum -a 256 *.node > SHA256SUMS 2>/dev/null || cat SHA256SUMS
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/webtransport/prebuilds/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
