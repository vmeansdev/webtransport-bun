# Release: build prebuilds for all targets, generate checksums, create GitHub release, publish to npm.
# P3.2: Security gates block release on CRITICAL/HIGH findings.
name: release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_to_npm:
        description: "Publish to npm (requires npm trusted publisher configured)"
        required: false
        type: boolean
        default: false
jobs:
  security:
    name: Security gates (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo audit (Rust dependencies)
        run: cargo install cargo-audit --locked && cargo audit --ignore RUSTSEC-2026-0009
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: Trivy vulnerability scan (libraries)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          scanners: vuln
          vuln-type: library
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript", "rust"]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  parity:
    name: Parity (W3C facade)
    needs: [security, codeql]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - name: Build native addon
        run: bun run build:native
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Parity tests
        run: bun run test:parity
      - name: Produce parity evidence
        run: |
          echo '{"suite":"parity","passed":true,"timestamp":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","ref":"'${{ github.ref_name }}'"}' > parity-evidence.json
      - name: Upload parity evidence
        uses: actions/upload-artifact@v4
        with:
          name: parity-evidence
          path: parity-evidence.json

  interop:
    name: Interop (Chromium)
    needs: [security, codeql]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - name: Build native addon
        run: bun run build:native
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Interop (Chromium)
        run: |
          cd tools/interop
          bun install
          bun run install:browsers
          bun run prepare:interop
          INTEROP_EVIDENCE=1 bun run playwright test
        timeout-minutes: 5
      - name: Upload interop evidence
        uses: actions/upload-artifact@v4
        with:
          name: interop-evidence
          path: tools/interop/interop-evidence.json

  build:
    needs: [security, codeql]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            rust_target: ""
          - os: macos-latest
            target: darwin-arm64
            rust_target: ""
          - os: macos-latest
            target: darwin-x64
            rust_target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - name: Build native addon (${{ matrix.target }})
        run: |
          if [ -n "${{ matrix.rust_target }}" ]; then
            rustup target add ${{ matrix.rust_target }}
            bunx @napi-rs/cli build --cwd crates/native --platform --release --target ${{ matrix.rust_target }}
          else
            bun run build:native
          fi
      - name: Prebuild + checksums
        run: |
          cd packages/webtransport && bun run prebuild:native
          cd prebuilds
          shasum -a 256 *.node > SHA256SUMS 2>/dev/null || true
      - name: Upload prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.target }}
          path: packages/webtransport/prebuilds/*

  release:
    needs: [build, interop, parity]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: prebuilds-*
          path: prebuilds
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: interop-evidence
          path: interop-evidence
      - uses: actions/download-artifact@v4
        with:
          name: parity-evidence
          path: parity-evidence
      - name: Verify required evidence (CI-EVIDENCE-A)
        run: |
          find interop-evidence -name "interop-evidence.json" -type f | grep -q . || (echo "::error::Missing interop-evidence.json"; exit 1)
          find parity-evidence -name "parity-evidence.json" -type f | grep -q . || (echo "::error::Missing parity-evidence.json"; exit 1)
      - name: Regenerate combined SHA256SUMS (all targets)
        run: |
          cd prebuilds
          shasum -a 256 *.node 2>/dev/null | sort -k2 > SHA256SUMS
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            prebuilds/*
            interop-evidence/*
            parity-evidence/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish_to_npm) || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.NPM_TRUSTED_PUBLISHING == 'true') }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - uses: actions/download-artifact@v4
        with:
          path: packages/webtransport/prebuilds
          merge-multiple: true
      - name: Publish to npm
        run: |
          cd packages/webtransport
          npm publish --access public --provenance
